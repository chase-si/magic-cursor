<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <title>magic-cursor</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        color: #e2e8f0;
        background: #0f172a;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem 3rem;
        box-sizing: border-box;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
        font-weight: 600;
      }
      .grid-wrap {
        width: min(980px, 100%);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .cell {
        position: relative;
        height: 240px;
        border: 1px solid #334155;
        overflow: hidden;
        background: linear-gradient(145deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      }
      .cell[data-effect=""] {
        background: radial-gradient(80% 80% at 50% 30%, rgba(99, 102, 241, 0.05), transparent 60%),
          linear-gradient(145deg, #0b1220 0%, #0f172a 100%);
      }
      .cell[data-effect="invertRing"] {
        background: conic-gradient(
            from 210deg,
            #ff004c,
            #ff7a00,
            #ffe600,
            #00d084,
            #00b3ff,
            #7c3aed,
            #ff004c
          ),
          radial-gradient(70% 70% at 30% 30%, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0) 60%),
          linear-gradient(145deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
        background-blend-mode: screen, normal, normal;
      }
      .cell-bg {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-size: clamp(18px, 3.5vw, 44px);
        color: rgba(226, 232, 240, 0.5);
        pointer-events: none;
        user-select: none;
      }
      .cell-meta {
        /* position: absolute; */
        left: 12px;
        top: 10px;
        font-size: 12px;
        color: rgba(148, 163, 184, 0.75);
        pointer-events: none;
        user-select: none;
      }
      .magnetic-row {
        position: absolute;
        left: 50%;
        top: 52%;
        transform: translate(-50%, -50%);
        display: flex;
        gap: 0.65rem;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 92%;
      }
      .magnetic-row .pill {
        padding: 0.65rem 1.1rem;
        border-radius: 999px;
        background: #312e81;
        border: 1px solid #6366f1;
        color: #e0e7ff;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <h1>Move your cursor to see the Effects</h1>
    <div class="grid-wrap">
      <div class="grid" id="grid">
        <div class="cell" data-effect="spotlight">
          <div class="cell-bg">spotlight</div>
          <div class="cell-meta">spotlight</div>
        </div>
        <div class="cell" data-effect="trail">
          <div class="cell-bg">trail</div>
          <div class="cell-meta">trail</div>
        </div>
        <div class="cell" data-effect="flame">
          <div class="cell-bg">flame</div>
          <div class="cell-meta">flame</div>
        </div>
        <div class="cell" data-effect="smoke">
          <div class="cell-bg">smoke</div>
          <div class="cell-meta">smoke</div>
        </div>
        <div class="cell" data-effect="magnetic">
          <div class="cell-bg">magnetic</div>
          <div class="cell-meta">magnetic</div>
          <div class="magnetic-row">
            <span class="pill" data-magnetic>吸引</span>
            <span class="pill" data-magnetic>磁吸</span>
            <span class="pill" data-magnetic>Hover</span>
          </div>
        </div>
        <div class="cell" data-effect="ring">
          <div class="cell-bg">ring</div>
          <div class="cell-meta">ring</div>
        </div>
        <div class="cell" data-effect="magnifier">
          <div class="cell-bg">magnifier</div>
          <div class="cell-meta">magnifier</div>
        </div>
        <div class="cell" data-effect="invertRing">
          <div class="cell-bg">invertRing</div>
          <div class="cell-meta">invertRing</div>
        </div>
        <div class="cell" data-effect="invertRing">
          <div class="cell-bg">invertRing</div>
          <div class="cell-meta">invertRing</div>
        </div>
      </div>
    </div>
    <script type="module" src="./demo.ts"></script>
  </body>
</html>
